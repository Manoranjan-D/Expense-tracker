<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>💸 Expense Tracker</h1>
    <div class="header-actions">
      <button id="export-btn" class="btn btn-secondary" title="Download all expenses as CSV">Export CSV</button>
    </div>
  </header>

  <main class="container">
    <!-- Summary cards -->
    <section class="summary-grid" aria-label="Summary">
      <div class="card summary-card">
        <span class="summary-label">This Month</span>
        <span class="summary-value" id="sum-month">$0.00</span>
      </div>
      <div class="card summary-card">
        <span class="summary-label">Today</span>
        <span class="summary-value" id="sum-today">$0.00</span>
      </div>
      <div class="card summary-card">
        <span class="summary-label">All Time</span>
        <span class="summary-value" id="sum-total">$0.00</span>
      </div>
      <div class="card summary-card">
        <span class="summary-label">Transactions</span>
        <span class="summary-value" id="sum-count">0</span>
      </div>
    </section>

    <div class="layout">
      <!-- Add / edit form -->
      <section class="card form-card" aria-label="Add expense">
        <h2 id="form-title">Add Expense</h2>
        <form id="expense-form" autocomplete="off">
          <input type="hidden" id="expense-id" />
          <div class="field">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="e.g. Groceries at Trader Joe's" required maxlength="120" />
          </div>
          <div class="field-row">
            <div class="field">
              <label for="amount">Amount</label>
              <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
            </div>
            <div class="field">
              <label for="date">Date</label>
              <input type="date" id="date" required />
            </div>
          </div>
          <div class="field">
            <label for="category">Category</label>
            <select id="category" required>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Housing">🏠 Housing</option>
              <option value="Utilities">💡 Utilities</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Health">⚕️ Health</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Education">📚 Education</option>
              <option value="Travel">✈️ Travel</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
          <div class="field">
            <label for="notes">Notes <span class="optional">(optional)</span></label>
            <textarea id="notes" rows="2" maxlength="300" placeholder="Anything worth remembering…"></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submit-btn">Add Expense</button>
            <button type="button" class="btn btn-secondary hidden" id="cancel-edit-btn">Cancel</button>
          </div>
        </form>
      </section>

      <!-- Expense list -->
      <section class="card list-card" aria-label="Expenses">
        <div class="list-header">
          <h2>Expenses</h2>
          <div class="filters">
            <input type="search" id="search" placeholder="Search…" aria-label="Search expenses" />
            <select id="filter-category" aria-label="Filter by category">
              <option value="">All categories</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Housing">Housing</option>
              <option value="Utilities">Utilities</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Health">Health</option>
              <option value="Shopping">Shopping</option>
              <option value="Education">Education</option>
              <option value="Travel">Travel</option>
              <option value="Other">Other</option>
            </select>
            <select id="filter-month" aria-label="Filter by month">
              <option value="">All months</option>
            </select>
          </div>
        </div>
        <div class="filter-summary hidden" id="filter-summary"></div>
        <ul id="expense-list" class="expense-list"></ul>
        <p id="empty-state" class="empty-state">No expenses yet. Add your first one on the left! 🎉</p>
      </section>
    </div>

    <!-- Category breakdown -->
    <section class="card chart-card" aria-label="Category breakdown">
      <h2>Spending by Category <span class="chart-scope" id="chart-scope"></span></h2>
      <div id="category-chart" class="category-chart"></div>
      <p id="chart-empty" class="empty-state">Nothing to chart yet.</p>
    </section>
  </main>

  <footer class="app-footer">
    Data is stored locally in your browser (localStorage). Nothing leaves your device.
  </footer>

  <script src="app.js"></script>
</body>
</html>
